name = "pfm-backend"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"

[[d1_databases]]
binding = "DB"
database_name = "pfm_dts"
database_id = "6a2aa7a2-07f3-4739-98f6-7746cf92fa5c"
migrations_dir = "migrations"

[durable_objects]
bindings = [{ name = "ROOM_HUB", class_name = "RoomHub" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomHub"]
